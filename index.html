<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>@spidorkaras</title>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Onest',-apple-system,sans-serif;min-height:100svh;overflow-x:hidden;background:#080010}
a,button,.sb,.glass{cursor:pointer}

#bg-canvas{position:fixed;inset:0;z-index:0;width:100%;height:100%}

#flash{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0;background:rgba(255,255,255,.55);transition:opacity .12s}

#flash{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0;background:rgba(255,255,255,.55);transition:opacity .12s}
#flash.go{animation:flash-anim .5s ease forwards}
@keyframes flash-anim{0%{opacity:0}25%{opacity:1}100%{opacity:0}}

:root{
  --gb:rgba(255,255,255,0.07);--gbr:rgba(255,255,255,0.11);
  --gs:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.12);
  --bb:rgba(255,255,255,0.07);--bbr:rgba(255,255,255,0.13);--bh:rgba(255,255,255,0.13);
  --t1:rgba(255,255,255,.92);--t2:rgba(255,255,255,.38);--ic:rgba(255,255,255,.80);
  --sb:rgba(255,255,255,0.12);--sf:rgba(255,255,255,.75);
  --badge:rgba(255,255,255,0.07);--badgebr:rgba(255,255,255,0.13);
  --a1:#7c3aed;--a2:#2563eb;
}
.lt{
  --gb:rgba(255,255,255,.55);--gbr:rgba(255,255,255,.8);
  --gs:0 8px 32px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.9);
  --bb:rgba(255,255,255,.6);--bbr:rgba(255,255,255,.85);--bh:rgba(255,255,255,.75);
  --t1:rgba(14,14,22,.88);--t2:rgba(14,14,22,.38);--ic:rgba(14,14,22,.75);
  --sb:rgba(0,0,0,.08);--sf:rgba(14,14,22,.7);
  --badge:rgba(0,0,0,.06);--badgebr:rgba(0,0,0,.12);
}

.page{position:relative;z-index:1;min-height:100svh;display:flex;flex-direction:column;align-items:center;padding:48px 16px 72px;gap:10px}
.stack{width:100%;max-width:400px;display:flex;flex-direction:column;gap:10px}

.glass{background:var(--gb);backdrop-filter:blur(60px) saturate(220%);-webkit-backdrop-filter:blur(60px) saturate(220%);border:1px solid var(--gbr);border-radius:24px;box-shadow:var(--gs);position:relative;overflow:hidden;transition:background .5s,border-color .5s,box-shadow .5s}
.glass::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.09) 0%,transparent 60%);pointer-events:none;z-index:0;border-radius:inherit}
.glass>*{position:relative;z-index:1}

/* ── PROFILE ── */
.p-card{padding:22px 22px 18px}
.av-row{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.av-wrap{position:relative;flex-shrink:0}
.av-label{display:block;cursor:pointer}
.av{width:82px;height:82px;border-radius:20px;background:linear-gradient(145deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:34px;position:relative;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.38);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.av-label:hover .av{transform:scale(1.07) rotate(-2deg)}
.av::after{content:'';position:absolute;inset:0;border:1.5px solid rgba(255,255,255,.22);border-radius:inherit;pointer-events:none;z-index:2}
#avImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:18px;z-index:1}
.av-overlay{position:absolute;inset:0;border-radius:18px;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;opacity:0;transition:opacity .2s;z-index:3}
.av-label:hover .av-overlay{opacity:1}
.av-overlay svg{width:18px;height:18px;fill:#fff}
.av-overlay span{font-size:8px;font-weight:800;color:#fff;letter-spacing:.8px;text-transform:uppercase}
#avatarInput{display:none}
.av-glow{position:absolute;inset:-10px;border-radius:30px;background:linear-gradient(145deg,var(--a1),var(--a2));opacity:.25;filter:blur(18px);z-index:-1;transition:background .55s;animation:ag 4s ease-in-out infinite}
@keyframes ag{0%,100%{opacity:.22;transform:scale(1)}50%{opacity:.45;transform:scale(1.12)}}

.u-info{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.username{font-size:20px;font-weight:800;letter-spacing:-.6px;line-height:1;color:var(--t1);transition:all .3s ease}
.username.out{opacity:0;transform:translateY(-8px) scale(0.95)}
.username.in{opacity:0;transform:translateY(8px) scale(0.95)}

.badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:8px;background:var(--badge);border:1px solid var(--badgebr);font-size:10.5px;font-weight:600;color:var(--t1);letter-spacing:.15px;transition:all .5s}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.s-on{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.3);color:#34d399}
.s-on .sdot{background:#10b981;box-shadow:0 0 5px #10b981;animation:sg 2s ease-in-out infinite}
.s-sl{background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.3);color:#a78bfa}
.s-sl .sdot{background:#8b5cf6;animation:sf 3s ease-in-out infinite}
@keyframes sg{0%,100%{box-shadow:0 0 4px #10b981}50%{box-shadow:0 0 10px #10b981,0 0 18px #10b98144}}
@keyframes sf{0%,100%{opacity:1}50%{opacity:.3}}

/* ── SOCIALS ── */
.soc{display:flex;flex-direction:column;gap:7px}
.row{display:grid;gap:7px}.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}
.sb{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 10px;border-radius:14px;background:var(--bb);border:1px solid var(--bbr);cursor:pointer;text-decoration:none;color:var(--t1);font-size:12px;font-weight:600;letter-spacing:.1px;position:relative;overflow:hidden;transition:background .4s,border-color .4s,color .4s,transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s}
.sb svg{width:18px;height:18px;fill:var(--ic);flex-shrink:0;transition:fill .4s}
.sb:hover{background:var(--bh);transform:translateY(-2px) scale(1.022);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.sb:active{transform:scale(.95)}
.sb .rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.2);transform:scale(0);animation:rip .55s ease-out forwards;pointer-events:none}
@keyframes rip{to{transform:scale(4);opacity:0}}
.lbl{font-size:11.5px;font-weight:600}

/* ── CONTROLS ── */
.ctrl{padding:16px 18px;display:flex;align-items:center;gap:14px}
.sls{flex:1;display:flex;flex-direction:column;gap:11px}.sl-row{display:flex;align-items:center;gap:9px}
.sl-ic{width:16px;height:16px;fill:var(--t2);flex-shrink:0;transition:fill .5s}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:2px;background:var(--sb);outline:none;cursor:pointer;transition:background .5s}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--sf);box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.3);cursor:pointer;transition:transform .2s,background .5s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.3)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--sf);border:none}
.pal-btn{width:48px;height:48px;border-radius:13px;background:var(--bb);border:1px solid var(--bbr);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .5s,border-color .5s,transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s}
.pal-btn:hover{background:var(--bh);transform:scale(1.1) rotate(20deg);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.pal-btn svg{width:20px;height:20px;fill:var(--ic);transition:fill .5s}

/* ── PICKER ── */
.picker{width:100%;max-width:400px;display:grid;grid-template-columns:repeat(5,1fr);gap:9px;padding:14px 16px;border-radius:20px;max-height:0;overflow:hidden;opacity:0;pointer-events:none;transform:translateY(-8px) scale(.97);transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s,transform .3s cubic-bezier(.34,1.56,.64,1),background .5s,border-color .5s}
.picker.open{max-height:140px;opacity:1;pointer-events:all;transform:translateY(0) scale(1)}
.td{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
.td:hover{transform:scale(1.12)}.td:active{transform:scale(.9)}
.dc{width:36px;height:36px;border-radius:50%;border:2.5px solid rgba(255,255,255,.2);box-shadow:0 4px 12px rgba(0,0,0,.3);transition:border-color .25s,box-shadow .25s}
.td.on .dc{border-color:rgba(255,255,255,.85);box-shadow:0 0 0 3px rgba(255,255,255,.2)}
.dl{font-size:9px;font-weight:700;color:var(--t2);text-align:center;letter-spacing:.2px;transition:color .5s}

/* ── CLOCK CARD ── */
.clock-card{padding:20px 22px}
.clock-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.clock-row+.clock-row{margin-top:14px;padding-top:14px;border-top:1px solid var(--gbr)}
.clock-meta{display:flex;flex-direction:column;gap:3px}
.clock-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t2);transition:color .5s}
.clock-tz{font-size:9px;font-weight:500;color:var(--t2);opacity:.6;transition:color .5s}
.clock-num{font-size:23px;font-weight:800;letter-spacing:-1px;color:var(--t1);font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:1px;transition:color .5s}
.colon{animation:cblink 1s step-end infinite;opacity:.6}
@keyframes cblink{0%,100%{opacity:.6}50%{opacity:.1}}
@keyframes numPop{from{transform:translateY(-4px);opacity:.3}to{transform:translateY(0);opacity:1}}
.pop{animation:numPop .17s ease-out}

/* ── COMMENTS ── */
.cm-card{padding:20px 22px 16px}
.cm-title{font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--t2);margin-bottom:13px;transition:color .5s}
.cm-inner{border-radius:24px;overflow:hidden;position:relative;background:var(--gb);border:1px solid var(--gbr)}
.cm-inner::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,0.05) 0%,transparent 60%);pointer-events:none;z-index:0;border-radius:inherit}
.cm-inner>*{position:relative;z-index:1}

.cm-form{display:flex;flex-direction:column;gap:10px;padding:12px}
.cm-user-row{display:flex;align-items:center;justify-content:space-between}
.cm-user-info{display:flex;align-items:center;gap:8px}
.cm-user-avatar{width:24px;height:24px;border-radius:50%;background:var(--a1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.cm-logout{font-size:11px;color:var(--t2);cursor:pointer;text-decoration:underline}
.cm-input{background:var(--bb);border:1px solid var(--bbr);border-radius:12px;padding:12px;color:var(--t1);font-family:inherit;font-size:13px;outline:none;transition:border-color .3s}
.cm-input:focus{border-color:var(--a1)}
.cm-input::placeholder{color:var(--t2)}
.cm-row{display:flex;gap:8px}
.cm-row .cm-input{flex:1}
.cm-btn{background:var(--a1);border:none;border-radius:10px;padding:10px 16px;color:#fff;font-weight:600;font-size:13px;cursor:pointer;transition:transform .2s,opacity .2s}
.cm-btn:hover{transform:scale(1.02);opacity:.9}
.cm-btn:active{transform:scale(0.98)}
.cm-btn:disabled{opacity:.5;cursor:not-allowed}

.cm-list{display:flex;flex-direction:column;gap:10px;padding:0 12px 12px;max-height:400px;overflow-y:auto}
.cm-item{background:var(--bb);border-radius:12px;padding:12px;border:1px solid var(--bbr)}
.cm-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cm-item-name{font-weight:700;color:var(--t1);font-size:13px}
.cm-item-time{font-size:10px;color:var(--t2)}
.cm-item-text{color:var(--t1);font-size:13px;line-height:1.4}
.cm-item-actions{margin-top:8px;display:flex;gap:8px}
.cm-reply-btn{font-size:11px;color:var(--a1);cursor:pointer;background:none;border:none}
.cm-reply-btn:hover{text-decoration:underline}
.cm-reply-form{margin-top:8px;display:flex;gap:6px}
.cm-reply-form .cm-input{flex:1;padding:8px;font-size:12px}
.cm-reply-form .cm-btn{padding:6px 12px;font-size:11px}
.cm-reply-item{margin-top:8px;padding-left:12px;border-left:2px solid var(--a2)}
.cm-empty{text-align:center;color:var(--t2);padding:20px;font-size:13px}
/* ── AUTH TABS ── */
.cm-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--sb);border-radius:10px;padding:3px}
.cm-tab{flex:1;padding:7px 4px;border:none;border-radius:8px;background:transparent;color:var(--t2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.cm-tab.active{background:var(--bb);color:var(--t1);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.cm-tab:hover:not(.active){color:var(--t1)}
.cm-panel{display:flex;flex-direction:column;gap:8px}
.cm-spam{color:#ef4444;font-size:11px;margin-top:2px}
.cm-clear{font-size:10px;color:var(--t2);cursor:pointer;text-decoration:underline;margin-top:8px;text-align:center}
.cm-delete{font-size:10px;color:#ef4444;cursor:pointer;margin-left:8px}
.cm-delete:hover{text-decoration:underline}

/* Send Animation */
.cm-send-anim{position:fixed;pointer-events:none;z-index:9999}
.cm-send-anim svg{width:30px;height:30px;animation:sendDrop .8s ease-in forwards}
@keyframes sendDrop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(200px) scale(0.5)}}

/* New comment animation */
.cm-item-new{animation:newComment .5s ease-out}
@keyframes newComment{from{opacity:0;transform:translateY(-20px);background:var(--a1)}to{opacity:1;transform:translateY(0)}}

/* GIF Support */
.cm-gif-btn{background:none;border:none;font-size:20px;cursor:pointer;opacity:.6;transition:opacity .2s}
.cm-gif-btn:hover{opacity:1}
.cm-gif-preview{max-width:200px;border-radius:8px;display:none;margin-top:6px}
.cm-gif-preview.show{display:block}
.cm-gif-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.cm-item img[src$=".gif"],.cm-item-text+img,.cm-reply-item img{max-width:80px;max-height:80px;border-radius:8px;margin-top:6px;display:inline-block;vertical-align:middle}
.cm-sticker{max-width:80px !important;max-height:80px !important;border-radius:8px !important}
.cm-gif-preview{max-width:80px;max-height:80px;border-radius:8px;display:none;margin-top:6px}

/* IMAGE UPLOAD & DRAWING */
.cm-attach-row{display:flex;gap:6px;align-items:center;margin-top:4px}
.cm-img-btn{background:none;border:none;font-size:18px;cursor:pointer;opacity:.55;transition:opacity .2s;padding:2px 4px;border-radius:8px}
.cm-img-btn:hover{opacity:1;background:var(--bb)}
.cm-img-preview-wrap{display:flex;align-items:flex-end;gap:6px}
.cm-img-prev{max-width:72px;max-height:72px;border-radius:10px;display:none;margin-top:6px;cursor:pointer;object-fit:cover;border:2px solid var(--a1);transition:transform .2s}
.cm-img-prev:hover{transform:scale(1.06)}
.cm-img-prev.show{display:block}
.cm-img-remove{font-size:10px;color:#ef4444;cursor:pointer;display:none;background:none;border:none;font-family:inherit;padding:2px 4px;border-radius:6px;transition:background .2s}
.cm-img-remove:hover{background:rgba(239,68,68,.15)}
.cm-img-remove.show{display:inline}
/* thumbnails in comment list */
.cm-thumb{max-width:80px;max-height:80px;border-radius:8px;cursor:pointer;margin-top:6px;object-fit:cover;display:block;border:1px solid var(--bbr);transition:transform .2s,box-shadow .2s}
.cm-thumb:hover{transform:scale(1.07);box-shadow:0 4px 16px rgba(0,0,0,.4)}
/* lightbox */
.cm-lightbox{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;cursor:pointer;animation:lbFade .18s ease}
@keyframes lbFade{from{opacity:0}to{opacity:1}}
.cm-lightbox img{max-width:90vw;max-height:88vh;border-radius:14px;box-shadow:0 24px 64px rgba(0,0,0,.6);cursor:default;animation:lbPop .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes lbPop{from{transform:scale(.88)}to{transform:scale(1)}}
.lb-close{position:absolute;top:20px;right:24px;color:#fff;font-size:28px;cursor:pointer;opacity:.7;transition:opacity .2s;background:none;border:none;line-height:1}
.lb-close:hover{opacity:1}
/* drawing modal */
.draw-modal{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.87);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);animation:lbFade .18s ease}
.draw-box{background:#12001e;border-radius:20px;padding:16px;display:flex;flex-direction:column;gap:10px;max-width:95vw;border:1px solid rgba(255,255,255,.12);box-shadow:0 24px 64px rgba(0,0,0,.6)}
.draw-tools{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.draw-color{width:26px;height:26px;border-radius:50%;border:2.5px solid rgba(255,255,255,.2);cursor:pointer;transition:border-color .15s,transform .15s;flex-shrink:0}
.draw-color:hover{transform:scale(1.15)}
.draw-color.active{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.25);transform:scale(1.15)}
.draw-canvas{border-radius:12px;touch-action:none;cursor:crosshair;display:block}
.draw-btn2{padding:8px 14px;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;font-family:inherit}
.draw-size-row{display:flex;align-items:center;gap:6px}
.draw-size{flex:1;height:3px;cursor:pointer;accent-color:var(--a1)}

.cm-list{display:flex;flex-direction:column;gap:10px;padding:0 12px 12px;max-height:300px;overflow-y:auto}
.cm-item{background:var(--bb);border-radius:12px;padding:12px;border:1px solid var(--bbr)}
.cm-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cm-item-name{font-weight:700;color:var(--t1);font-size:13px}
.cm-item-time{font-size:10px;color:var(--t2)}
.cm-item-text{color:var(--t1);font-size:13px;line-height:1.4}
.cm-empty{text-align:center;color:var(--t2);padding:20px;font-size:13px}

.foot{font-size:10.5px;color:var(--t2);text-align:center;padding-top:4px;transition:color .5s;letter-spacing:.4px}

.fact-btn{width:100%;padding:14px 20px;border-radius:20px;border:none;background:var(--bb);color:var(--t1);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.fact-btn:hover{background:var(--bh);transform:scale(1.02)}
.fact-btn:active{transform:scale(0.98)}
.fact-output{padding:0 20px;border-radius:20px;background:var(--bb);border:1px solid var(--bbr);color:var(--t1);font-size:14px;word-wrap:break-word;max-height:0;overflow:hidden;opacity:0;transform:translateY(-6px) scale(0.96);transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .3s,transform .35s cubic-bezier(.34,1.56,.64,1),padding .3s}
.fact-output.show{max-height:200px;padding:16px 20px;opacity:1;transform:translateY(0) scale(1)}
.fact-char{display:inline;opacity:0;animation:charPop .12s ease forwards}
@keyframes charPop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fact-particle{position:fixed;pointer-events:none;z-index:9998;font-size:14px;animation:fpFly .8s ease-out forwards}
@keyframes fpFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--fx),var(--fy)) scale(0.3)}}

/* BEAT EFFECT */
.beat-on{will-change:transform;transition:transform 60ms linear}

/* CURSORS */
.cursor-overlay{position:fixed;inset:0;pointer-events:none;z-index:8888}
.cursor-dot{position:fixed;pointer-events:none;transition:left .12s linear,top .12s linear;transform:translate(-50%,-50%)}
.cursor-dot svg{width:20px;height:20px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.cursor-dot .cursor-name{position:absolute;top:18px;left:6px;font-size:10px;font-weight:700;color:#fff;background:var(--a1);padding:1px 6px;border-radius:6px;white-space:nowrap;letter-spacing:.2px}

/* CURSORS BUTTON */
.cm-cursors-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;background:var(--bb);border:1px solid var(--bbr);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.cm-cursors-btn:hover{background:var(--bh);color:var(--t1)}
.cm-cursors-btn.active{background:rgba(124,58,237,.18);border-color:rgba(124,58,237,.4);color:#a78bfa}
.cm-cursors-dot{width:7px;height:7px;border-radius:50%;background:var(--t2);transition:background .2s}
.cm-cursors-btn.active .cm-cursors-dot{background:#a78bfa;box-shadow:0 0 6px #a78bfa;animation:sg 1.5s ease-in-out infinite}

.m-card{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.m-row{display:flex;align-items:center;gap:12px}
.m-btn{width:44px;height:44px;border-radius:50%;background:var(--a1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;flex-shrink:0}
.m-btn:hover{transform:scale(1.1)}
.m-btn:active{transform:scale(0.95)}
.m-btn svg{width:20px;height:20px;fill:#fff}
.m-info{flex:1;min-width:0}
.m-title{font-size:14px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-artist{font-size:11px;color:var(--t2);margin-top:2px}
.m-progress{width:100%;display:flex;align-items:center;gap:8px}
.m-progress input[type=range]{flex:1;height:4px;border-radius:2px;background:var(--sb);cursor:pointer}
.m-time{font-size:10px;color:var(--t2);font-variant-numeric:tabular-nums;min-width:35px}
.m-eq{display:flex;justify-content:center;gap:3px;height:20px;align-items:flex-end}
.m-eq span{width:4px;background:var(--a1);border-radius:2px;height:20%;animation:eqBar .4s ease-in-out infinite}
.m-eq.play span{animation-play-state:running}
.m-eq:not(.play) span{animation-play-state:paused;height:20% !important}
@keyframes eqBar{0%,100%{height:20%}25%{height:80%}50%{height:100%}75%{height:60%}}

/* SHAKE EFFECT - applied inline to music card */

/* PULSE */
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* GLOW PULSE */
.glow{animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 10px var(--a1)}50%{box-shadow:0 0 25px var(--a1),0 0 40px var(--a2)}}

/* ── ENTRANCE ANIMATIONS ── */
.stack>*{opacity:0;transform:translateY(28px) scale(.97);animation:fadeUp .6s cubic-bezier(.22,1,.36,1) forwards}
.stack>*:nth-child(1){animation-delay:.05s}
.stack>*:nth-child(2){animation-delay:.14s}
.stack>*:nth-child(3){animation-delay:.22s}
.stack>*:nth-child(4){animation-delay:.30s}
.stack>*:nth-child(5){animation-delay:.37s}
.stack>*:nth-child(6){animation-delay:.44s}
.stack>*:nth-child(7){animation-delay:.51s}
.stack>*:nth-child(8){animation-delay:.58s}
.stack>*:nth-child(9){animation-delay:.65s}
.stack>*:nth-child(10){animation-delay:.72s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0) scale(1)}}

@media(max-width:480px){
  .page{padding:28px 12px 56px}.p-card{padding:16px}
  .av{width:70px;height:70px;border-radius:16px;font-size:28px}
  .username{font-size:17px}.sb{padding:11px 8px}.lbl{display:none}.clock-num{font-size:19px}
}
@media(min-width:700px){
  .stack{max-width:430px}.av{width:90px;height:90px;border-radius:22px}
  .username{font-size:22px}.clock-num{font-size:25px}
}
</style>

let cur='violet';
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
let tgt=TH.violet.oc.map(h2r),cc=tgt.map(c=>[...c]);
const orbs=TH.violet.oc.map(h=>{const[r,g,b]=h2r(h);return{x:Math.random()*800,y:Math.random()*600,r:150+Math.random()*180,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,ph:Math.random()*Math.PI*2,c:[r,g,b]}});
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}resize();addEventListener('resize',resize);
(function draw(t){
  requestAnimationFrame(draw);const td=TH[cur];
  const gr=cx.createLinearGradient(0,0,W,H);
  gr.addColorStop(0,td.bg[0]);gr.addColorStop(.5,td.bg[1]);gr.addColorStop(1,td.bg[2]);
  cx.fillStyle=gr;cx.fillRect(0,0,W,H);
  tgt=td.oc.map(h2r);
  orbs.forEach((o,i)=>{
    cc[i]=cc[i].map((v,j)=>v+(tgt[i][j]-v)*.02);
    o.x+=o.vx+Math.sin(t*.00034+o.ph)*.26;o.y+=o.vy+Math.cos(t*.00027+o.ph)*.26;
    if(o.x<-o.r)o.x=W+o.r;if(o.x>W+o.r)o.x=-o.r;
    if(o.y<-o.r)o.y=H+o.r;if(o.y>H+o.r)o.y=-o.r;
    const[r,g,b]=cc[i];const rg=cx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
    rg.addColorStop(0,`rgba(${r|0},${g|0},${b|0},.48)`);rg.addColorStop(1,`rgba(${r|0},${g|0},${b|0},0)`);
    cx.fillStyle=rg;cx.beginPath();cx.arc(o.x,o.y,o.r,0,Math.PI*2);cx.fill();
  });
})(0);

/* MUSIC PLAYER + BEAT */
let audio=new Audio(),isPlaying=false;
const mPlayBtn=document.getElementById('mPlayBtn'),mSeek=document.getElementById('mSeek'),mEq=document.getElementById('mEq');
const mPlayIcon=document.getElementById('mPlayIcon'),mPauseIcon=document.getElementById('mPauseIcon');
const mCurTime=document.getElementById('mCurTime'),mDurTime=document.getElementById('mDurTime');
const musicCard=document.getElementById('musicCard');

audio.src='https://raw.githubusercontent.com/spiderkarasio/mybio/main/SpotiDownloader.com%20-%20Water%20Resistant%20-%20Anamanaguchi.mp3';
audio.volume=0.6;audio.crossOrigin='anonymous';

let audioCtx=null,analyser=null,beatRaf=null;
function initAudioCtx(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const src=audioCtx.createMediaElementSource(audio);
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=256;analyser.smoothingTimeConstant=0.75;
  src.connect(analyser);analyser.connect(audioCtx.destination);
}

let lastBeat=0,beatCooldown=180;
function beatLoop(){
  if(!isPlaying){musicCard.style.transform='';return;}
  beatRaf=requestAnimationFrame(beatLoop);
  const buf=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buf);
  // bass = first 8 bins (~0-340Hz)
  let bass=0;for(let i=0;i<8;i++)bass+=buf[i];bass=bass/8/255;
  // mid punch 
  let mid=0;for(let i=8;i<24;i++)mid+=buf[i];mid=mid/16/255;
  const energy=bass*0.75+mid*0.25;
  const now=performance.now();
  if(energy>0.42&&now-lastBeat>beatCooldown){
    lastBeat=now;
    const s=1+energy*0.055,tx=(Math.random()-.5)*energy*4,ty=-energy*3;
    musicCard.style.transform=`scale(${s}) translate(${tx}px,${ty}px)`;
    setTimeout(()=>{musicCard.style.transform=`scale(1) translate(0,0)`;},85);
  }
}

function formatTime(s){
  if(isNaN(s))return'0:00';
  return Math.floor(s/60)+':'+(Math.floor(s%60)<10?'0':'')+Math.floor(s%60);
}

function toggleMusic(){
  if(isPlaying){
    audio.pause();isPlaying=false;
    mPlayIcon.style.display='block';mPauseIcon.style.display='none';
    mEq.classList.remove('play');
    cancelAnimationFrame(beatRaf);musicCard.style.transform='';
    document.querySelector('.av-glow').style.animationDuration='4s';
    document.querySelector('.av-glow').style.opacity='0.22';
  }else{
    initAudioCtx();
    if(audioCtx.state==='suspended')audioCtx.resume();
    audio.play().catch(()=>{});isPlaying=true;
    mPlayIcon.style.display='none';mPauseIcon.style.display='block';
    mEq.classList.add('play');
    document.querySelector('.av-glow').style.animationDuration='1s';
    document.querySelector('.av-glow').style.opacity='0.6';
    beatLoop();
  }
}

mSeek.addEventListener('input',()=>{

let lastComments=[];
async function loadComments(){
  try{
    const res=await fetch(cmAPI+cmPath);
    const arr=await res.json();
    const wasEmpty=lastComments.length===0;
    const hasNew=arr.length>lastComments.length;
    lastComments=arr;
    renderComments(arr,hasNew&&!wasEmpty);
  }catch(e){cmList.innerHTML='<div class="cm-empty">Ошибка загрузки</div>'}
}

function renderComments(arr,hasNew){
  if(!arr||arr.length===0){cmList.innerHTML='<div class="cm-empty">Пока нет комментариев</div>';return}
  const newClass=hasNew?' cm-item-new':'';
  cmList.innerHTML=arr.slice(-10).reverse().map((c,i)=>{
    let repliesHtml='';
    if(c.replies&&c.replies.length){
      repliesHtml='<div class="cm-reply-item">'+c.replies.map(r=>{
        const gifHtml=r.gif?`<img src="${r.gif}" class="cm-sticker" loading="lazy" alt="GIF" onerror="this.style.display='none'">`:'';
        const imgHtml=r.img?`<img src="${r.img}" class="cm-thumb" onclick="openLightbox(this.src)" loading="lazy" alt="изображение">`:'';
        return`<div class="cm-item" style="padding:8px;margin-top:4px"><div class="cm-item-header"><span class="cm-item-name">${r.name}</span><span class="cm-item-time">${formatDate(r.time)}</span></div>${gifHtml}${imgHtml}<div class="cm-item-text">${r.text}</div></div>`;
      }).join('')+'</div>';
    }
    const gifHtml=c.gif?`<img src="${c.gif}" class="cm-sticker" loading="lazy" alt="GIF" onerror="this.style.display='none'">`:'';
    const imgHtml=c.img?`<img src="${c.img}" class="cm-thumb" onclick="openLightbox(this.src)" loading="lazy" alt="изображение">`:'';
    return`<div class="cm-item${i===0&&hasNew?newClass:''}"><div class="cm-item-header"><span class="cm-item-name">${c.name}</span><span class="cm-item-time">${formatDate(c.time)}</span></div>${gifHtml}${imgHtml}<div class="cm-item-text">${c.text}</div><div class="cm-item-actions"><button class="cm-reply-btn" onclick="showReplyForm('${c.time}')">Ответить</button></div><div id="reply-${c.time}" style="display:none"></div>${repliesHtml}</div>`;
  }).join('');
}

let guestImg='', authImg='';

function compressImg(file,maxDim=420,quality=0.78){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const im=new Image();
      im.onload=()=>{
        let w=im.width,h=im.height;
        if(w>maxDim||h>maxDim){if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}else{w=Math.round(w*maxDim/h);h=maxDim;}}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(im,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',quality));
      };
      im.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* Drawing modal */
const DRAW_COLORS=['#ffffff','#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#a78bfa','#ec4899','#000000','#64748b'];
let drawTarget='guest';
function openDrawModal(target){
  drawTarget=target;
  const cw=Math.min(innerWidth-80,320),ch=Math.round(cw*0.65);
  const modal=document.createElement('div');modal.className='draw-modal';modal.id='drawModal';
  modal.innerHTML=`<div class="draw-box">
    <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.5px">🎨 Рисуй</div>
    <div class="draw-tools">
      ${DRAW_COLORS.map((c,i)=>`<div class="draw-color${i===0?' active':''}" style="background:${c}" onclick="pickDrawColor(this,'${c}')"></div>`).join('')}
    </div>
    <div class="draw-size-row">
      <span style="font-size:11px;color:rgba(255,255,255,.4)">✏️</span>
      <input type="range" class="draw-size" id="drawSize" min="2" max="28" value="6">
      <button class="draw-btn2" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6)" onclick="setDrawEraser()">◻ ластик</button>
      <button class="draw-btn2" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6)" onclick="clearDrawCanvas()">🗑</button>
    </div>
    <canvas class="draw-canvas" id="drawCanvas" width="${cw}" height="${ch}"></canvas>
    <div style="display:flex;gap:8px">
      <button class="draw-btn2" style="flex:1;background:var(--a1);color:#fff;font-size:13px" onclick="confirmDraw()">✓ Готово</button>
      <button class="draw-btn2" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5)" onclick="closeDrawModal()">Отмена</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  initDrawCanvas();
}
let drawCtx,isDrawing=false,drawColor='#ffffff',drawEraser=false,lastDX=0,lastDY=0;
function initDrawCanvas(){
  const cv=document.getElementById('drawCanvas');
  drawCtx=cv.getContext('2d');
  drawCtx.fillStyle='#1a1030';drawCtx.fillRect(0,0,cv.width,cv.height);
  drawCtx.lineCap='round';drawCtx.lineJoin='round';
  function pos(e){const r=cv.getBoundingClientRect();if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.clientX-r.left,y:e.clientY-r.top};}
  function draw(e){
    if(!isDrawing)return;
    const p=pos(e);
    drawCtx.globalCompositeOperation=drawEraser?'destination-out':'source-over';
    drawCtx.strokeStyle=drawColor;
    drawCtx.lineWidth=parseInt(document.getElementById('drawSize').value);
    drawCtx.beginPath();drawCtx.moveTo(lastDX,lastDY);drawCtx.lineTo(p.x,p.y);drawCtx.stroke();
    lastDX=p.x;lastDY=p.y;
  }
  cv.addEventListener('mousedown',e=>{isDrawing=true;const p=pos(e);lastDX=p.x;lastDY=p.y;});
  cv.addEventListener('mousemove',draw);
  cv.addEventListener('mouseup',()=>isDrawing=false);
  cv.addEventListener('mouseleave',()=>isDrawing=false);
  cv.addEventListener('touchstart',e=>{e.preventDefault();isDrawing=true;const p=pos(e);lastDX=p.x;lastDY=p.y;},{passive:false});
  cv.addEventListener('touchmove',e=>{e.preventDefault();draw(e);},{passive:false});
  cv.addEventListener('touchend',()=>isDrawing=false);
}
window.pickDrawColor=function(el,c){drawColor=c;drawEraser=false;document.querySelectorAll('#drawModal .draw-color').forEach(d=>d.classList.remove('active'));el.classList.add('active');};
window.setDrawEraser=function(){drawEraser=true;document.querySelectorAll('#drawModal .draw-color').forEach(d=>d.classList.remove('active'));};
window.clearDrawCanvas=function(){const cv=document.getElementById('drawCanvas');drawCtx.globalCompositeOperation='source-over';drawCtx.fillStyle='#1a1030';drawCtx.fillRect(0,0,cv.width,cv.height);};
window.confirmDraw=function(){

};

/* ── CURSORS ── */
const CURSOR_API=cmAPI+'cursors';
let cursorsOn=false,cursorPollIv=null,cursorSendIv=null;
let myMouseX=0,myMouseY=0;
const cursorOverlay=document.createElement('div');cursorOverlay.className='cursor-overlay';document.body.appendChild(cursorOverlay);
const myCursorId='cur_'+Math.random().toString(36).slice(2,9);
const myCursorColor=['#a78bfa','#60a5fa','#f472b6','#34d399','#fb923c'][Math.floor(Math.random()*5)];
document.addEventListener('mousemove',e=>{myMouseX=e.clientX;myMouseY=e.clientY;});
document.addEventListener('touchmove',e=>{if(e.touches[0]){myMouseX=e.touches[0].clientX;myMouseY=e.touches[0].clientY;}},{passive:true});
const activeCursors={};
function renderCursors(list){
  const seen=new Set();
  list.forEach(c=>{
    if(c.id===myCursorId)return;
    seen.add(c.id);
    const xp=(c.x/c.vw)*100,yp=(c.y/c.vh)*100;
    const ax=xp/100*innerWidth,ay=yp/100*innerHeight;
    if(activeCursors[c.id]){
      const el=activeCursors[c.id];
      el.style.left=ax+'px';el.style.top=ay+'px';
    }else{
      const el=document.createElement('div');el.className='cursor-dot';
      el.style.left=ax+'px';el.style.top=ay+'px';
      el.innerHTML=`<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M5.5 3.5L19 12l-7 1.5L9.5 20z" fill="${c.color||'#a78bfa'}" stroke="rgba(0,0,0,.4)" stroke-width="1.2"/></svg><div class="cursor-name" style="background:${c.color||'#a78bfa'}">${c.name||'???'}</div>`;
      cursorOverlay.appendChild(el);activeCursors[c.id]=el;
    }
  });
  Object.keys(activeCursors).forEach(id=>{
    if(!seen.has(id)){activeCursors[id].remove();delete activeCursors[id];}
  });
  const cnt=seen.size;
  const countEl=document.getElementById('cursorCount');
  if(cnt>0){countEl.style.display='inline';countEl.textContent=cnt;}
  else{countEl.style.display='none';}
}
async function sendCursor(){
  const name=currentUserName||(document.getElementById('cmGuestName').value.trim()||'Аноним');
  try{await fetch(CURSOR_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:myCursorId,x:myMouseX,y:myMouseY,vw:innerWidth,vh:innerHeight,name,color:myCursorColor})});}catch(e){}
}
async function pollCursors(){
  try{const r=await fetch(CURSOR_API);const d=await r.json();if(Array.isArray(d))renderCursors(d);}catch(e){}
}
window.toggleCursors=function(){
  const btn=document.getElementById('cursorToggleBtn');
  cursorsOn=!cursorsOn;
  btn.classList.toggle('active',cursorsOn);
  document.getElementById('cursorBtnLabel').textContent=cursorsOn?'Онлайн':'Курсоры';
  if(cursorsOn){
    sendCursor();pollCursors();
    cursorSendIv=setInterval(sendCursor,400);
    cursorPollIv=setInterval(pollCursors,600);
  }else{
    clearInterval(cursorSendIv);clearInterval(cursorPollIv);
    Object.keys(activeCursors).forEach(id=>{activeCursors[id].remove();delete activeCursors[id];});
    document.getElementById('cursorCount').style.display='none';
    try{fetch(CURSOR_API+'/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:myCursorId})});}catch(e){}
  }
};

const factBtn=document.getElementById('factBtn'),factOutput=document.getElementById('factOutput');
let lastFact=-1,factTimer,twTimer;
const FACT_PARTICLES=['✨','⚡','🔥','💜','🎲','💫','🌟'];
function spawnFactParticles(btn){
  const r=btn.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<7;i++){
    const p=document.createElement('div');p.className='fact-particle';
    const ang=Math.PI*2*i/7,dist=55+Math.random()*35;
    p.style.setProperty('--fx',Math.cos(ang)*dist+'px');
    p.style.setProperty('--fy',Math.sin(ang)*dist+'px');
    p.style.left=cx+'px';p.style.top=cy+'px';
    p.style.animationDelay=(i*55)+'ms';
    p.textContent=FACT_PARTICLES[i%FACT_PARTICLES.length];
    document.body.appendChild(p);setTimeout(()=>p.remove(),1000);
  }
}
function typewriteFact(text){
  factOutput.innerHTML='';factOutput.classList.add('show');
  clearTimeout(twTimer);
  let i=0;
  (function next(){
    if(i>=text.length)return;
    const sp=document.createElement('span');sp.className='fact-char';
    sp.style.animationDelay=(i*18)+'ms';
    sp.textContent=text[i++];
    factOutput.appendChild(sp);
    twTimer=setTimeout(next,18);
  })();
}
factBtn.addEventListener('click',e=>{
  if(factTimer)clearTimeout(factTimer);
  let idx;do{idx=Math.floor(Math.random()*factsList.length)}while(idx===lastFact&&factsList.length>1);
  lastFact=idx;
  spawnFactParticles(factBtn);
  typewriteFact(factsList[idx]);
  factTimer=setTimeout(()=>factOutput.classList.remove('show'),8000);
});
